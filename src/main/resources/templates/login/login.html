<!DOCTYPE html>
    <html lang="en">
        <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
            <script src="https://cdn.tailwindcss.com"></script>
            <title>Staff Portal Login Page</title>
        </head>

        <body>
            <div class="flex h-screen w-full">

                <!--   Login page left side with inputs  -->
                <div class="flex flex-1 items-center justify-center bg-white p-10">
                    <form class="w-full max-w-sm" method="post" action="/login">
                        <input name="_csrf" type="hidden" th:value="${_csrf.token}">
                        <h2 class="text-3xl font-bold mb-6">Staff Portal Login</h2>
                        <div class="space-y-4">
                            <div th:if="${param.error}"
                                 class="p-3 rounded-lg bg-red-50 border border-red-100 text-red-700 text-sm font-medium text-center shadow-sm">
                                Invalid username or password.
                            </div>
                            <div th:if="${param.logout}"
                                 class="p-3 rounded-lg bg-emerald-50 border border-emerald-100 text-emerald-700 text-sm font-medium text-center shadow-sm">
                                You have been successfully logged out.
                            </div>
                            <div>
                                <label for="username" class="sr-only">Username</label>
                                <input type="text" id="username" name="username" placeholder="Username"
                                       class="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-teal-600 outline-none" required="required">
                            </div>
                            <div>
                                <label for="password" class="sr-only">Password</label>
                                <input type="password" id="password" name="password" placeholder="Password"
                                       class="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-teal-600 outline-none" required="required">
                            </div>
                            <div class="flex items-center px-1">
                                <input type="checkbox" id="remember-me" name="remember-me"
                                       class="w-4 h-4 rounded accent-gray-500 cursor-pointer">
                                <label for="remember-me"
                                       class="ml-2 text-sm text-gray-500 cursor-pointer select-none">
                                    Keep me logged in?
                                </label>
                            </div>
                            <div>
                                <button type="submit"
                                        class="w-full bg-[#1D6160] text-white py-2 rounded font-bold hover:brightness-110 transition">
                                    Log in
                                </button>
                            </div>
                            <div class="text-center mt-2">
                                <a href="/"
                                   class="text-xs text-gray-500 hover:text-gray-600 transition underline underline-offset-4">
                                    Go back to home
                                </a>
                            </div>
                        </div>
                    </form>
                </div>

                <!--   Login page right side image container    -->
                <div class="hidden md:block md:w-1/2 lg:w-2/3">
                    <img src="/images/login.jpg"
                         th:src="@{/images/login.jpg}"
                         class="h-full w-full object-cover"
                         alt="Staff Portal Background">
                </div>
            </div>
        </body>
</html>
